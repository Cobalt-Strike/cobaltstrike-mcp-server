name: Tests

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  unit-tests:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install httpx==0.28.1

      - name: Run unit tests
        run: python -m unittest

      - name: Compile Python modules
        run: |
          python -m py_compile \
            cs_mcp.py \
            cs_audit.py \
            cs_client.py \
            cs_server.py \
            cs_files.py \
            cs_resources.py \
            cs_streams.py \
            tests/test_core.py

      - name: Validate example JSON
        run: |
          python -m json.tool examples/claude_desktop_config/claude_desktop_config_example.json > /dev/null
          python -m json.tool examples/claude_desktop_config/claude_config_development.json > /dev/null
          python -m json.tool examples/claude_desktop_config/claude_config_production.json > /dev/null
          python -m json.tool examples/claude_desktop_config/claude_config_windows.json > /dev/null
